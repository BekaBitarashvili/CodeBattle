{% extends "base.html" %}
{% block title %}Admin Login{% endblock %}
{% block content %}
<div style="min-height:70vh;display:flex;align-items:center;justify-content:center;padding:2rem">
  <div style="background:var(--card);border:1px solid var(--border);border-radius:22px;padding:3rem 2.8rem;width:100%;max-width:400px;backdrop-filter:blur(12px)">
    <div style="text-align:center;margin-bottom:2rem">
      <div style="font-size:2.5rem;margin-bottom:.8rem">🔐</div>
      <h1 style="font-size:1.5rem;font-weight:900;margin-bottom:.3rem">Admin Panel</h1>
      <p style="color:var(--muted);font-size:.9rem">{{ t("CodeMama ადმინისტრაცია", "CodeMama Administration") }}</p>
    </div>

    {% if error %}
    <div style="background:#f4433618;border:1px solid #f4433640;border-radius:10px;padding:10px 14px;color:#f44336;font-size:.88rem;margin-bottom:1.2rem;text-align:center">
      {{ error }}
    </div>
    {% endif %}

    <form method="POST">
      <div style="margin-bottom:1.4rem">
        <label style="display:block;font-size:.82rem;font-weight:700;margin-bottom:.5rem;color:var(--muted)">
          {{ t("პაროლი", "Password") }}
        </label>
        <input type="password" name="password" placeholder="••••••••"
               style="width:100%;padding:13px 16px;border-radius:12px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:1rem;font-family:'Outfit',sans-serif"
               autofocus/>
      </div>
      <button type="submit" class="btn-primary" style="width:100%;padding:14px;font-size:1rem;border-radius:12px;border:none;cursor:pointer">
        {{ t("შესვლა", "Login") }} →
      </button>
    </form>
  </div>
</div>
{% endblock %}
