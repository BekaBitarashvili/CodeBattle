{% extends "base.html" %}
{% block title %}რეგისტრაცია{% endblock %}
{% block content %}
<section style="display:flex;align-items:center;justify-content:center;min-height:80vh;padding:2rem">
  <div style="width:100%;max-width:420px">
    <div style="background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:2.5rem">
      <div class="modal-title" data-ka="შექმენი ანგარიში" data-en="Create account">შექმენი ანგარიში</div>
      <div class="modal-sub">CodeQuest</div>
      <form method="POST">
        <div class="input-group">
          <label>Username</label>
          <input type="text" name="username" placeholder="giorgi_codes" required/>
        </div>
        <div class="input-group">
          <label data-ka="ელ-ფოსტა" data-en="Email">ელ-ფოსტა</label>
          <input type="email" name="email" placeholder="you@example.com" required/>
        </div>
        <div class="input-group">
          <label data-ka="პაროლი" data-en="Password">პაროლი</label>
          <input type="password" name="password" placeholder="••••••••" required/>
        </div>
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% for cat, msg in messages %}<div class="form-error">{{ msg }}</div>{% endfor %}
        {% endwith %}
        <button type="submit" class="btn-primary btn-block" style="margin-top:.5rem">რეგისტრაცია</button>
      </form>
    </div>
  </div>
</section>
{% endblock %}
